<div
  class="shadow-md border-t border-gray-200 flex flex-wrap gap-4 py-15 px-8 max-w-sm justify-center items-center my-50 mx-auto rounded-sm">
  <div class="flex flex-col items-center gap-2">
    <img alt="" width="80" height="80" ngSrc="/hongfa.png">
    <h1 class="text-lg font-bold">Sign in with your username</h1>
  </div>
  <div class="flex flex-col gap-8 w-full justify-center items-center">
    <div>
      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-user"></i>
        </p-inputgroup-addon>
        <input class="border-1 border-gray-300 rounded-r-sm" type="text" pInputText placeholder="Username">
      </p-inputgroup>
    </div>
    <div>
      <p-inputgroup>
        <p-inputgroup-addon>
          <i class="pi pi-lock"></i>
        </p-inputgroup-addon>
        <input class="border-1 border-gray-300 rounded-r-sm" type="password" pInputText placeholder="Password">
      </p-inputgroup>
    </div>
    <div>
      <p-button label="Sign In" severity="info" variant="outlined"></p-button>
    </div>
  </div>
</div>
